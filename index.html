<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
<title>📚 Clube do Livro — Votação</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     CONFIGURAÇÃO: Cola o teu URL do Google Apps Script aqui
     ============================================================ */

  :root {
    --amber-50: #fffbeb; --amber-100: #fef3c7; --amber-600: #d97706;
    --amber-700: #b45309; --amber-800: #92400e;
    --stone-50: #fafaf9; --stone-100: #f5f5f4; --stone-200: #e7e5e4;
    --stone-300: #d6d3d1; --stone-400: #a8a29e; --stone-500: #78716c;
    --stone-600: #57534e; --stone-700: #44403c; --stone-800: #292524;
    --stone-900: #1c1917;
    --green-50: #ecfdf5; --slate-400: #94a3b8; --slate-500: #64748b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Crimson Text', Georgia, serif;
    color: var(--stone-900);
    min-height: 100vh;
    background: #fff;
  }

  .page { max-width: 680px; margin: 0 auto; padding: 32px 20px 60px; }

  /* Banner: title left, tabs right */
  .banner {
    display: flex; justify-content: space-between; align-items: flex-end;
    border-bottom: 1px solid var(--stone-200);
    margin-bottom: 28px; gap: 16px;
  }
  .brand {
    font-size: 22px; font-weight: 700; margin: 0;
    padding-bottom: 12px; letter-spacing: -0.3px;
  }

  /* Votação intro (subtitle + voter badge, sits above name input) */
  .vote-intro { text-align: center; margin-bottom: 24px; }
  .subtitle { font-size: 15px; color: var(--stone-500); margin: 0 0 12px; font-style: italic; }
  .badge {
    display: inline-block; background: var(--amber-100); color: var(--amber-800);
    font-size: 12px; font-weight: 600; padding: 4px 14px; border-radius: 20px;
    font-family: system-ui, sans-serif;
  }

  /* Name input */
  .name-section { text-align: center; padding: 40px 20px; }
  .name-label { display: block; font-size: 18px; margin-bottom: 16px; color: var(--stone-700); }
  .name-row { display: flex; flex-direction: column; gap: 10px; max-width: 360px; margin: 0 auto; }
  .name-input {
    flex: 1; padding: 12px 16px; font-size: 16px; border: 2px solid var(--stone-300);
    border-radius: 10px; outline: none; font-family: inherit; background: var(--stone-50);
  }
  .name-input:focus { border-color: var(--amber-700); }
  .name-btn {
    padding: 12px 20px; font-size: 15px; font-weight: 600; background: var(--stone-800);
    color: #fff; border: none; border-radius: 10px; cursor: pointer;
    font-family: system-ui, sans-serif; white-space: nowrap;
  }
  .name-btn:disabled { opacity: 0.4; cursor: default; }

  /* Instructions */
  .instructions {
    text-align: center; font-size: 14px; color: var(--stone-600);
    margin-bottom: 22px; font-family: system-ui, sans-serif;
  }

  /* Cards */
  .grid { display: flex; flex-direction: column; gap: 12px; }
  .card {
    border: 2px solid var(--stone-200); border-radius: 14px; padding: 16px 18px;
    background: var(--stone-50); transition: all 0.2s; cursor: pointer; position: relative;
  }
  .card:hover { border-color: var(--stone-300); }
  .card.selected { border-color: var(--amber-700); background: var(--amber-50); box-shadow: 0 0 0 1px var(--amber-700); }
  .card.disabled { opacity: 0.4; cursor: not-allowed; }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .title-row { display: flex; align-items: flex-start; gap: 8px; flex: 1; min-width: 0; }
  .emoji { font-size: 22px; flex-shrink: 0; margin-top: 1px; }
  .book-title { font-size: 18px; font-weight: 700; color: var(--stone-800); line-height: 1.3; }
  .author { font-size: 13px; color: var(--stone-500); font-family: system-ui, sans-serif; }

  .check {
    width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--stone-300);
    display: flex; align-items: center; justify-content: center; background: #fff;
    flex-shrink: 0; margin-top: 2px;
  }
  .card.selected .check { border-color: var(--amber-700); background: var(--amber-50); }
  .check-mark { color: var(--amber-700); font-weight: 800; font-size: 14px; display: none; }
  .card.selected .check-mark { display: block; }

  .sinopse { margin: 0 0 8px; font-size: 14px; color: var(--stone-600); line-height: 1.55; font-style: italic; }
  .porque {
    margin: 0 0 10px; font-size: 13px; color: var(--amber-800); line-height: 1.4;
    font-family: system-ui, sans-serif; background: var(--amber-100);
    padding: 6px 10px; border-radius: 8px; font-weight: 500;
  }
  .links { display: flex; align-items: center; gap: 6px; }
  .shop-link {
    font-size: 13px; color: var(--amber-700); text-decoration: none;
    font-family: system-ui, sans-serif; font-weight: 600;
    padding: 8px 4px;
  }
  .shop-link:hover { text-decoration: underline; }
  .link-sep { font-size: 12px; color: var(--stone-300); }

  /* Footer */
  .footer {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 24px; padding: 16px 20px; background: var(--stone-800); border-radius: 14px;
    position: sticky; bottom: 0; z-index: 10;
    padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));
  }
  .sel-info { color: var(--stone-300); font-size: 14px; font-family: system-ui, sans-serif; font-weight: 600; }
  .submit-btn {
    padding: 12px 32px; font-size: 16px; font-weight: 700; background: var(--amber-600);
    color: #fff; border: none; border-radius: 10px; cursor: pointer;
    font-family: system-ui, sans-serif; transition: opacity 0.2s;
  }
  .submit-btn:disabled { opacity: 0.4; cursor: default; }

  /* Results */
  .results-section { margin-top: 8px; }
  .thank-you {
    text-align: center; padding: 20px; background: var(--green-50); border-radius: 14px;
    margin-bottom: 24px; display: flex; flex-direction: column; align-items: center;
    gap: 6px; font-family: system-ui, sans-serif; font-size: 15px;
  }
  .saving-indicator {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--stone-500); margin-top: 4px;
  }
  .spinner {
    width: 14px; height: 14px; border: 2px solid var(--stone-200);
    border-top-color: var(--stone-500); border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .results-title { font-size: 22px; font-weight: 700; margin-bottom: 18px; text-align: center; }
  .results-list { display: flex; flex-direction: column; gap: 10px; }
  .result-card {
    display: flex; align-items: center; gap: 12px;
    border: 2px solid var(--stone-200); border-radius: 12px;
    padding: 12px 14px; background: var(--stone-50);
    cursor: pointer; flex-wrap: wrap;
  }
  .result-card.leader { border-color: var(--amber-600); background: var(--amber-50); }
  .result-card.tie { border-color: #0f766e; background: #f0fdfa; }
  .result-rank {
    font-size: 22px; flex-shrink: 0; width: 32px; text-align: center;
    font-family: system-ui, sans-serif;
  }
  .result-rank.numeric { font-size: 15px; font-weight: 700; color: var(--stone-400); }
  .result-body { flex: 1; min-width: 0; }
  .result-book-row { display: flex; align-items: center; gap: 6px; }
  .result-emoji { font-size: 18px; flex-shrink: 0; }
  .result-book-title { font-size: 14px; font-weight: 700; color: var(--stone-800); }
  .result-author { font-size: 12px; color: var(--stone-400); display: block; margin-top: 2px; }
  .result-count {
    font-size: 13px; color: var(--stone-500); font-family: system-ui, sans-serif;
    font-weight: 600; display: block; margin-top: 4px;
  }
  .result-toggle {
    flex-shrink: 0; font-size: 18px;
  }
  .result-details {
    display: none; width: 100%; padding: 10px 0 4px 44px;
  }
  .result-card.expanded .result-details { display: block; }

  .voter-list { margin-top: 24px; text-align: center; }
  .voter-title {
    font-size: 12px; color: var(--stone-400); margin-bottom: 8px;
    font-family: system-ui, sans-serif; text-transform: uppercase;
    letter-spacing: 0.5px; font-weight: 600;
  }
  .voter-chips { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
  .chip {
    display: inline-block; padding: 4px 12px; background: var(--amber-100);
    color: var(--amber-800); border-radius: 20px; font-size: 12px;
    font-family: system-ui, sans-serif; font-weight: 500;
  }

  .actions-row { display: flex; justify-content: center; gap: 10px; margin-top: 24px; }
  .refresh-btn, .reset-btn, .peek-btn {
    padding: 12px 22px; font-size: 14px; border-radius: 10px; cursor: pointer;
    font-family: system-ui, sans-serif;
  }
  .refresh-btn { background: var(--stone-100); border: 1px solid var(--stone-300); color: var(--stone-700); }
  .reset-btn { background: transparent; border: 1px solid var(--stone-200); color: var(--stone-400); }
  .peek-btn {
    display: block; margin: 18px auto 0; background: transparent;
    border: 1px solid var(--stone-300); color: var(--stone-500);
  }

  /* Loading */
  .loading-wrap {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 60vh; gap: 16px;
  }
  .spinner {
    width: 30px; height: 30px; border: 3px solid var(--stone-200);
    border-top: 3px solid var(--amber-700); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading-text { color: var(--stone-500); font-size: 14px; font-family: system-ui, sans-serif; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-banner {
    text-align: center; padding: 20px; background: #fef2f2; border-radius: 14px;
    margin-bottom: 24px; color: #991b1b; font-family: system-ui, sans-serif; font-size: 14px;
  }

  /* Tabs (sit on the right of the banner) */
  .tabs { display: flex; gap: 22px; margin-bottom: -1px; }
  .tab {
    font-family: system-ui, sans-serif; font-size: 14px; font-weight: 600;
    color: var(--stone-500); text-decoration: none;
    padding: 10px 4px; margin-bottom: -1px;
    border-bottom: 2px solid transparent;
    transition: color 0.15s;
  }
  .tab:hover { color: var(--stone-700); }
  .tab.active { color: var(--stone-900); border-bottom-color: var(--amber-700); }

  /* Stub view placeholder */
  .placeholder { text-align: center; color: var(--stone-400); padding: 60px 20px; font-style: italic; }

  /* Arquivo */
  .section-heading {
    font-size: 18px; font-weight: 700; color: var(--stone-800);
    margin: 0 0 16px; letter-spacing: -0.2px;
  }
  .muted { text-align: center; color: var(--stone-400); padding: 40px 20px; font-style: italic; }
  #archive-list { display: flex; flex-direction: column; gap: 8px; }
  .archive-row {
    border: 2px solid var(--stone-200); border-radius: 12px;
    background: var(--stone-50);
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .archive-row:hover { border-color: var(--stone-300); }
  .archive-row.expanded { border-color: var(--amber-700); }
  .archive-row.expanded:hover { border-color: var(--amber-700); }
  .archive-header {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; cursor: pointer;
  }
  .archive-winner {
    flex: 1; min-width: 0;
    display: flex; align-items: center; gap: 8px;
  }
  .archive-emoji { font-size: 20px; flex-shrink: 0; }
  .archive-title-author {
    font-size: 15px; color: var(--stone-800); font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex: 1; min-width: 0;
  }
  .archive-toggle {
    font-size: 18px; flex-shrink: 0;
    font-family: system-ui, sans-serif;
  }
  .archive-details {
    display: none;
    padding: 0 14px 16px;
    border-top: 1px solid var(--stone-200);
  }
  .archive-row.expanded .archive-details { display: block; }
  .archive-meta {
    font-family: system-ui, sans-serif; font-size: 12px;
    color: var(--stone-500); margin: 12px 0 10px;
    font-weight: 500;
  }
  .archive-note {
    font-size: 13px; color: var(--amber-800);
    font-style: italic;
    margin: 0 0 14px;
    padding: 8px 12px;
    background: var(--amber-50);
    border-radius: 8px;
    font-family: system-ui, sans-serif;
  }

  /* Início — callout slot (active-vote pill) */
  .inicio-pill {
    display: flex; align-items: center; gap: 10px;
    border: 1px solid var(--amber-700); border-radius: 999px;
    padding: 10px 18px; margin-bottom: 24px;
    color: var(--amber-800); font-size: 14px;
    font-family: system-ui, sans-serif; font-weight: 600;
    background: var(--amber-50); text-decoration: none;
    transition: background 0.15s;
  }
  .inicio-pill:hover { background: var(--amber-100); }
  .inicio-pill-msg {
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .inicio-pill-arrow { flex-shrink: 0; font-size: 16px; }

  /* Início — callout slot (no-vote: prominent expandable card) */
  .inicio-card {
    border: 2px solid var(--amber-700); border-radius: 14px;
    background: var(--amber-50); margin-bottom: 28px;
    overflow: hidden;
  }
  .inicio-card-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px; cursor: pointer;
    font-family: system-ui, sans-serif;
  }
  .inicio-card-title {
    flex: 1; font-size: 15px; font-weight: 700; color: var(--amber-800);
    letter-spacing: -0.2px;
  }
  .inicio-card-toggle { flex-shrink: 0; font-size: 18px; }
  .inicio-card-body {
    display: none; padding: 14px 18px 16px;
    border-top: 1px solid var(--amber-100);
  }
  .inicio-card.expanded .inicio-card-body { display: block; }
  .inicio-card-book {
    display: flex; align-items: flex-start; gap: 10px;
    margin-bottom: 10px;
  }
  .inicio-card-book .emoji { font-size: 24px; flex-shrink: 0; margin-top: 1px; }
  .inicio-card-book-meta { min-width: 0; }
  .inicio-card-book .book-title {
    font-size: 18px; font-weight: 700; color: var(--stone-800); line-height: 1.3;
  }
  .inicio-card-book .author {
    display: block; font-size: 13px; color: var(--stone-500);
    font-family: system-ui, sans-serif; margin-top: 2px;
  }

  /* Início — agenda list */
  #agenda-list { display: flex; flex-direction: column; gap: 10px; }
  .agenda-row {
    border: 2px solid var(--stone-200); border-radius: 12px;
    padding: 12px 16px; background: var(--stone-50);
    display: flex; flex-direction: column; gap: 4px;
    transition: border-color 0.15s;
  }
  .agenda-row.next { border-color: var(--amber-700); background: var(--amber-50); }
  .agenda-line-main {
    display: flex; flex-wrap: wrap; align-items: baseline; gap: 6px;
  }
  .agenda-pin { font-size: 16px; flex-shrink: 0; line-height: 1; }
  .agenda-date {
    font-family: system-ui, sans-serif; font-size: 13px; font-weight: 600;
    color: var(--stone-500); flex-shrink: 0;
  }
  .agenda-dot { color: var(--stone-300); font-size: 13px; }
  .agenda-book-emoji { font-size: 17px; }
  .agenda-book-title { font-size: 16px; font-weight: 700; color: var(--stone-800); }
  .agenda-range {
    font-size: 13px; color: var(--stone-500); font-style: italic;
    font-family: system-ui, sans-serif; margin-left: 2px;
  }
  .agenda-author {
    font-family: system-ui, sans-serif; font-size: 13px; color: var(--stone-500);
    font-style: italic;
  }
  .agenda-loc {
    font-family: system-ui, sans-serif; font-size: 13px; color: var(--stone-500);
  }
  .agenda-row.past .agenda-book-title {
    text-decoration: line-through; color: var(--stone-500);
  }
  .agenda-row.past .agenda-book-emoji { opacity: 0.55; }
  .agenda-findings {
    font-size: 14px; color: var(--stone-700); line-height: 1.55;
    margin-top: 8px;
  }
  .agenda-participants {
    display: flex; flex-wrap: wrap; gap: 4px;
    margin-top: 8px;
  }
  .agenda-participants .chip-small {
    display: inline-block; padding: 2px 9px;
    background: var(--stone-100); color: var(--stone-500);
    border-radius: 12px; font-size: 11px;
    font-family: system-ui, sans-serif;
  }

  /* Mobile: stack banner contents (title + tabs row don't fit on a phone) */
  @media (max-width: 480px) {
    .banner { flex-direction: column; align-items: stretch; gap: 6px; }
    .brand { text-align: center; font-size: 20px; padding-bottom: 0; }
    .tabs { justify-content: center; gap: 18px; }
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="page">
  <!-- Loading -->
  <div id="loading" class="loading-wrap">
    <div class="spinner"></div>
    <p class="loading-text">A carregar votação...</p>
  </div>

  <!-- Main content (hidden until loaded) -->
  <div id="app" class="hidden">
    <header class="banner">
      <h1 class="brand">📚 Clube do Livro</h1>
      <nav class="tabs">
        <a href="#inicio"  class="tab" data-tab="inicio">Início</a>
        <a href="#votacao" class="tab" data-tab="votacao">Votação</a>
        <a href="#arquivo" class="tab" data-tab="arquivo">Arquivo</a>
      </nav>
    </header>

    <!-- Error -->
    <div id="error-banner" class="error-banner hidden"></div>

    <!-- View: Início -->
    <section id="view-inicio" data-view="inicio" class="hidden">
      <div id="inicio-callout"></div>
      <h2 class="section-heading">Sessões</h2>
      <div id="agenda-list"></div>
      <p id="agenda-empty" class="muted hidden">Ainda não há sessões.</p>
    </section>

    <!-- View: Votação -->
    <section id="view-votacao" data-view="votacao" class="hidden">
      <div class="vote-intro">
        <p class="subtitle">Escolhe o próximo livro para lermos juntos</p>
        <div class="badge"><span id="voter-count">0</span> votos registados</div>
      </div>

      <!-- Step 1: Name -->
      <div id="name-section" class="name-section">
        <label class="name-label">Como te chamas?</label>
        <div class="name-row">
          <input id="name-input" class="name-input" placeholder="O teu nome..." />
          <button id="name-btn" class="name-btn" disabled>Continuar →</button>
        </div>
      </div>

      <!-- Step 2: Vote -->
      <div id="vote-section" class="hidden">
        <p id="greeting" class="instructions"></p>
        <div id="book-grid" class="grid"></div>
        <div class="footer">
          <div id="sel-info" class="sel-info">0/2 seleccionados</div>
          <button id="submit-btn" class="submit-btn" disabled>Votar ✓</button>
        </div>
      </div>

      <!-- Step 3: Results -->
      <div id="results-section" class="results-section hidden">
        <div id="thank-you" class="thank-you hidden">
          <span style="font-size:28px">🎉</span>
          <p id="thank-you-text"></p>
          <div id="saving-indicator" class="saving-indicator hidden">
            <div class="spinner"></div> A gravar...
          </div>
        </div>
        <h2 class="results-title">Resultados</h2>
        <div id="results-content"></div>
        <div class="actions-row">
          <button id="refresh-btn" class="refresh-btn">🔄 Actualizar</button>
          <button id="reset-btn" class="reset-btn">Reiniciar votação</button>
        </div>
      </div>

      <!-- Peek / Back buttons -->
      <button id="peek-btn" class="peek-btn hidden">👀 Espreitar resultados</button>
      <button id="back-btn" class="peek-btn hidden">← Voltar para votar</button>
    </section>

    <!-- View: Arquivo -->
    <section id="view-arquivo" data-view="arquivo" class="hidden">
      <h2 class="section-heading">Arquivo de votações</h2>
      <div id="archive-list"></div>
      <p id="archive-empty" class="muted hidden">Ainda não há votações fechadas.</p>
    </section>
  </div>
</div>

<script>
// ============================================================
// CONFIGURAÇÃO — Cola aqui o teu URL codificado em Base64
// (ver instruções para como gerar)
// ============================================================
const _E = "aHR0cHM6Ly9zY3JpcHQuZ29vZ2xlLmNvbS9tYWNyb3Mvcy9BS2Z5Y2J6ZTVuR3BFQ0I2TENwRWFMaEcyejFSMmJSLTlyblR1Q2EtTDNLVG5ueGZ2RGRjR1dDWnRUZ1lPb3dlZUE2X25POC9leGVjCg==";
const API_URL = atob(_E);
// ============================================================

/**
 * Canonical book registry. Single source of truth for all book metadata.
 *
 * Everything else — ACTIVE_VOTE.bookIds, ARCHIVE[].bookIds, ARCHIVE[].winnerId,
 * AGENDA[].bookId — references entries here by their object key.
 *
 * Invariants:
 *  - Every id referenced anywhere in ACTIVE_VOTE, ARCHIVE, or AGENDA must
 *    have a matching key in BOOKS.
 *  - Once a key is referenced by an ARCHIVE or AGENDA entry, do NOT delete
 *    or rename it — there is no per-entry snapshot fallback for metadata,
 *    so the historical reference would silently break.
 *  - Edits to a book's title/author/sinopse/links propagate everywhere
 *    (live ballot AND historical archive/agenda views). Only vote tallies
 *    and voter records are frozen inside ARCHIVE entries.
 *
 * @typedef {{
 *   emoji:          string,
 *   title:          string,
 *   author:         string,
 *   pages:          number,
 *   sinopse:        string,

// Resolve a bookId to a Book with `id` injected, or null if unknown.
// All renderers consume the returned object; callers should filter nulls.
function getBook(id) {
  const b = BOOKS[id];
  return b ? { id, ...b } : null;
}

/**
 * @typedef {{
 *   number:    number,
 *   startedAt: string,
 *   maxVotes:  number,
 *   bookIds:   string[],
 * } | null} ActiveVote
 *
 * Invariants for ACTIVE_VOTE (when non-null):
 *  - `number` is exactly ARCHIVE[0].number + 1 (or 1 when ARCHIVE is empty).
 *  - `bookIds` is non-empty; each id resolves in BOOKS; ids are unique.
 *  - `maxVotes` is between 1 and bookIds.length.
 *  - `startedAt` is an ISO date (YYYY-MM-DD).
 */

/** @type {ActiveVote} */
const ACTIVE_VOTE = {
  number: 1,
  startedAt: "2026-05-14",
  maxVotes: 2,
  bookIds: ["saramago", "kang", "camus", "vhm", "ncs", "amado"],
};

/**
 * Closed-vote snapshots, ordered newest-first.
 *
 * Only the *vote* is snapshotted (votes, voters, ballot composition via
 * bookIds). Book metadata is resolved live from BOOKS at render time —
 * edit a title in BOOKS and every archive entry reflects it.
 *
 * Invariants (per entry):
 *  - `closedAt >= startedAt`.
 *  - `winnerId` ∈ `bookIds`.
 *  - `winnerNote` is omitted unless explicitly set.
 *  - `votes` keys are a subset of `bookIds`.
 *  - `voters[nameKey].books` are a subset of `bookIds`.
 *  - Every id in `bookIds` resolves in BOOKS.
 *
 * Invariants (across array):
 *  - ARCHIVE[0].number > ARCHIVE[1].number > … > ARCHIVE[N-1].number.
 *  - Numbers are dense (no gaps).
 *
 * @typedef {{
 *   number:      number,
 *   startedAt:   string,
 *   closedAt:    string,
 *   winnerId:    string,
 *   winnerNote?: string,
 *   maxVotes:    number,
 *   bookIds:     string[],
 *   votes:       Record<string, number>,
 *   voters:      Record<string, { name: string, books: string[] }>,
 * }} ArchiveEntry
 */

/** @type {ArchiveEntry[]} */
const ARCHIVE = [];

/**
 * Meeting log, ordered any way — `renderAgenda` sorts newest-first by date.
 *
 * Per-entry rules:
 *  - `date` is ISO (YYYY-MM-DD).
 *  - `time` and `location` are free-text strings.
 *  - `bookId` references a key in BOOKS.
 *  - `upToPage` is the planned reading target for this session.
 *  - `findings` and `participants` are valid only for entries
 *    whose `date` is strictly before today.
 *
 * @typedef {{
 *   date:          string,
 *   time:          string,
 *   location:      string,
 *   bookId:        string,
 *   upToPage?:     number,
 *   findings?:     string,
 *   participants?: string[],
 * }} AgendaEntry
 */

/** @type {AgendaEntry[]} */
const AGENDA = [];

// State
let allVotes = {};
let voters = {};
let selected = [];
let submittedName = "";
let hasVoted = false;

// DOM
const $ = (id) => document.getElementById(id);

// ---- Load data ----
async function loadData() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    allVotes = data.votes || {};
    voters = data.voters || {};
  } catch (e) {
    console.error("Erro ao carregar:", e);
  }
  updateVoterCount();
}

function updateVoterCount() {
  const count = Object.keys(voters).length;
  const badge = $("voter-count").parentElement;
  badge.innerHTML = '<span id="voter-count">' + count + "</span> " + (count === 1 ? "voto registado" : "votos registados");
}

// ---- Render book cards ----
function renderCandidateBooks() {
  const grid = $("book-grid");
  grid.innerHTML = "";

  ACTIVE_VOTE.bookIds.map(getBook).filter(Boolean).forEach((book) => {
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.id = book.id;
    card.innerHTML = `
      <div class="card-top">
        <div class="title-row">
          <span class="emoji">${book.emoji}</span>
          <div>
            <span class="book-title">${book.title}</span>
            <span class="author"> — ${book.author} · ${book.pages} pág.</span>
          </div>
        </div>
        <div class="check"><span class="check-mark">✓</span></div>
      </div>
      <p class="sinopse">«${book.sinopse}»</p>
      <p class="porque">💬 ${book.porque}</p>
      <div class="links">${renderShopLinks(book)}</div>
    `;

    card.addEventListener("click", (e) => {
      if (e.target.closest(".shop-link")) return;
      toggleBook(book.id);
    });

    grid.appendChild(card);
  });
}

function renderShopLinks(book) {
  return `
        <a href="${book.wook}" target="_blank" rel="noopener noreferrer" class="shop-link">Wook ↗</a>
        <span class="link-sep">·</span>
        <a href="${book.bertrand}" target="_blank" rel="noopener noreferrer" class="shop-link">Bertrand ↗</a>
      `;
}

function toggleBook(id) {
  if (hasVoted) return;
  const idx = selected.indexOf(id);
  if (idx > -1) {
    selected.splice(idx, 1);
  } else if (selected.length < ACTIVE_VOTE.maxVotes) {
    selected.push(id);
  }
  updateSelectionUI();
}

function updateSelectionUI() {
  document.querySelectorAll(".card").forEach((card) => {
    const id = card.dataset.id;
    const isSel = selected.includes(id);
    const isDis = !isSel && selected.length >= ACTIVE_VOTE.maxVotes;
    card.classList.toggle("selected", isSel);
    card.classList.toggle("disabled", isDis);
  });
  $("sel-info").textContent = selected.length + "/" + ACTIVE_VOTE.maxVotes + " seleccionados";
  $("submit-btn").disabled = selected.length === 0;
}

// ---- Submit vote ----
async function submitVote() {
  if (selected.length === 0 || !submittedName) return;

  // Snapshot state for rollback.
  const prevVotes = { ...allVotes };
  const prevVoters = { ...voters };

  // Optimistic update: apply locally and show results immediately.
  selected.forEach((id) => { allVotes[id] = (allVotes[id] || 0) + 1; });
  voters[submittedName.toLowerCase()] = { name: submittedName, books: selected };
  hasVoted = true;
  showLiveResults(true);
  $("saving-indicator").classList.remove("hidden");

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({ nome: submittedName, livros: selected }),
    });
    const data = await res.json();

    if (data.error) {
      // Server rejected — roll back.
      allVotes = prevVotes;
      voters = prevVoters;
      hasVoted = false;
      $("saving-indicator").classList.add("hidden");
      alert(data.error);
      $("results-section").classList.add("hidden");
      $("vote-section").classList.remove("hidden");
      $("name-section").classList.remove("hidden");
      $("peek-btn").classList.remove("hidden");
      renderCandidateBooks();
      return;
    }

    // Confirmed — hide the saving indicator.
    $("saving-indicator").classList.add("hidden");
  } catch (e) {
    // Network error — roll back.
    console.error("Erro ao votar:", e);
    allVotes = prevVotes;
    voters = prevVoters;
    hasVoted = false;
    $("saving-indicator").classList.add("hidden");
    alert("Erro ao enviar o voto. Tenta outra vez.");
    $("results-section").classList.add("hidden");
    $("vote-section").classList.remove("hidden");
    $("name-section").classList.remove("hidden");
    $("peek-btn").classList.remove("hidden");
    renderCandidateBooks();
  }
}

// Pure renderer: takes all data as arguments and paints into `container`.
// Tolerates `votes` keys or `voters` selections that aren't in `books`.
function renderResultsInto(container, books, votes, voters) {
  container.innerHTML = "";

  const sorted = [...books].sort((a, b) => (votes[b.id] || 0) - (votes[a.id] || 0));
  const topCount = sorted.length > 0 ? (votes[sorted[0].id] || 0) : 0;
  const isTied = topCount > 0 && sorted.filter((b) => (votes[b.id] || 0) === topCount).length > 1;
  const medals = ["🥇", "🥈", "🥉"];

  const list = document.createElement("div");
  list.className = "results-list";

  let rank = 0;
  let prevCount = -1;
  sorted.forEach((book) => {
    const count = votes[book.id] || 0;
    if (count !== prevCount) { rank++; prevCount = count; }

    const isLeader = count === topCount && count > 0 && !isTied;
    const isTie = count === topCount && count > 0 && isTied;
    const cardClass = isLeader ? 'leader' : (isTie ? 'tie' : '');
    const rankDisplay = rank <= 3 && count > 0
      ? '<span class="result-rank">' + medals[rank - 1] + '</span>'
      : '<span class="result-rank numeric">#' + rank + '</span>';

    const card = document.createElement("div");
    card.className = "result-card" + (cardClass ? " " + cardClass : "");
    card.innerHTML = `
      ${rankDisplay}
      <div class="result-body">
        <div class="result-book-row">
          <span class="result-emoji">${book.emoji}</span>
          <span class="result-book-title">${book.title}</span>
        </div>
        <span class="result-author">${book.author}</span>
        <span class="result-count">${count} ${count === 1 ? 'voto' : 'votos'}</span>
      </div>
      <span class="result-toggle">➕</span>
      <div class="result-details">
        <p class="sinopse">«${book.sinopse}»</p>
        <p class="porque">💬 ${book.porque}</p>
        <div class="links">${renderShopLinks(book)}</div>
      </div>
    `;
    card.addEventListener("click", (e) => {
      if (e.target.closest(".shop-link")) return;
      card.classList.toggle("expanded");
      card.querySelector(".result-toggle").textContent = card.classList.contains("expanded") ? "➖" : "➕";
    });
    list.appendChild(card);
  });
  container.appendChild(list);

  const voterKeys = Object.keys(voters);
  if (voterKeys.length > 0) {
    const voterList = document.createElement("div");
    voterList.className = "voter-list";
    voterList.innerHTML = `
      <p class="voter-title">Quem já votou:</p>
      <div class="voter-chips">
        ${voterKeys.map((k) => '<span class="chip">' + voters[k].name + '</span>').join("")}
      </div>
    `;
    container.appendChild(voterList);
  }
}

function showLiveResults(justVoted) {
  $("vote-section").classList.add("hidden");
  $("name-section").classList.add("hidden");
  $("results-section").classList.remove("hidden");
  $("peek-btn").classList.add("hidden");

  if (justVoted) {
    $("thank-you").classList.remove("hidden");
    $("thank-you-text").innerHTML = "Obrigado, <strong>" + submittedName + "</strong>! O teu voto foi registado.";
    $("back-btn").classList.add("hidden");
  } else {
    $("thank-you").classList.add("hidden");
    $("back-btn").classList.remove("hidden");
  }

  const books = ACTIVE_VOTE.bookIds.map(getBook).filter(Boolean);
  renderResultsInto($("results-content"), books, allVotes, voters);
  updateVoterCount();
}

// ---- Reset ----
async function resetPoll() {
  if (!confirm("Tens a certeza? Isto apaga TODOS os votos.\n\n(Terás de apagar as linhas na Google Sheet manualmente também.)")) return;
  // Note: we can't delete from the sheet via GET/POST easily,
  // so we just reset local state and tell the user
  alert("Para completar o reset, abre a tua Google Sheet e apaga as linhas de votos (mantém o cabeçalho).");
  allVotes = {};
  voters = {};
  hasVoted = false;
  selected = [];
  submittedName = "";
  $("results-section").classList.add("hidden");

// ---- Arquivo ----
const expandedEntries = new Set();

function renderArquivo() {
  const list = $("archive-list");
  const empty = $("archive-empty");
  list.innerHTML = "";

  if (ARCHIVE.length === 0) {
    empty.classList.remove("hidden");
    return;
  }
  empty.classList.add("hidden");

  ARCHIVE.forEach((entry) => {
    list.appendChild(renderArchiveRow(entry));
  });
}

function renderArchiveRow(entry) {
  const row = document.createElement("div");
  row.className = "archive-row";
  row.dataset.number = entry.number;
  const startsExpanded = expandedEntries.has(entry.number);
  if (startsExpanded) row.classList.add("expanded");

  const winner = getBook(entry.winnerId);
  const winnerLabel = winner
    ? `<span class="archive-emoji">${winner.emoji}</span><span class="archive-title-author">${winner.title} — ${winner.author}</span>`
    : `<span class="archive-title-author">Vencedor desconhecido</span>`;

  row.innerHTML = `
    <div class="archive-header">
      <div class="archive-winner">${winnerLabel}</div>
      <span class="archive-toggle">${startsExpanded ? "➖" : "➕"}</span>
    </div>
    <div class="archive-details"></div>
  `;

  row.querySelector(".archive-header").addEventListener("click", () => {
    const isExp = row.classList.toggle("expanded");
    row.querySelector(".archive-toggle").textContent = isExp ? "➖" : "➕";
    if (isExp) {
      expandedEntries.add(entry.number);
      paintArchiveDetails(row.querySelector(".archive-details"), entry);
    } else {
      expandedEntries.delete(entry.number);
    }
  });

  // Repaint details if this row started expanded (e.g., after a re-render).
  if (startsExpanded) {
    paintArchiveDetails(row.querySelector(".archive-details"), entry);
  }

  return row;
}

function paintArchiveDetails(container, entry) {
  container.innerHTML = "";

  const votesLabel = entry.maxVotes === 1 ? "voto" : "votos";
  const meta = document.createElement("p");
  meta.className = "archive-meta";
  meta.textContent = `#${entry.number} · ${formatDateRange(entry.startedAt, entry.closedAt)} · ${entry.maxVotes} ${votesLabel} por pessoa`;
  container.appendChild(meta);

  if (entry.winnerNote) {
    const note = document.createElement("p");
    note.className = "archive-note";
    note.textContent = entry.winnerNote;
    container.appendChild(note);
  }

  const results = document.createElement("div");
  container.appendChild(results);
  const books = entry.bookIds.map(getBook).filter(Boolean);
  renderResultsInto(results, books, entry.votes, entry.voters);
}

// `DD/MM – DD/MM` (same year) or `DD/MM/YY – DD/MM/YY` (cross-year). Inputs are ISO.
function formatDateRange(startedAt, closedAt) {
  const [sy, sm, sd] = startedAt.split("-");
  const [cy, cm, cd] = closedAt.split("-");
  if (sy === cy) return `${sd}/${sm} – ${cd}/${cm}`;
  return `${sd}/${sm}/${sy.slice(2)} – ${cd}/${cm}/${cy.slice(2)}`;
}

// ---- Início ----
const PT_MONTHS_SHORT = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

// Local-time today as YYYY-MM-DD. Avoids the UTC-vs-local off-by-one at midnight.
function todayISO() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

// Same-day counts as future (per plan).
function isFutureDate(dateStr) {
  return dateStr >= todayISO();
}

// "2026-05-22" → "22 mai" (current year) or "22 mai 2025" (other years).
function formatAgendaDate(dateStr) {
  const [y, m, d] = dateStr.split('-');
  const month = PT_MONTHS_SHORT[parseInt(m, 10) - 1] || m;
  const yearSuffix = y === todayISO().slice(0, 4) ? '' : ` ${y}`;
  return `${parseInt(d, 10)} ${month}${yearSuffix}`;
}

function renderInicio() {

}

function renderAgenda() {
  const list = $("agenda-list");
  const empty = $("agenda-empty");
  list.innerHTML = "";

  if (AGENDA.length === 0) {
    empty.classList.remove("hidden");
    return;
  }
  empty.classList.add("hidden");

  // Newest-first; future and past interleave by date, no separator.
  const sorted = [...AGENDA].sort((a, b) => b.date.localeCompare(a.date));

  // Find the chronologically nearest future entry (smallest date ≥ today).
  // Since `sorted` is desc and future entries cluster at the top,
  // the *last* one whose date ≥ today is the soonest.
  const today = todayISO();
  let nextDate = null;
  sorted.forEach((e) => { if (e.date >= today) nextDate = e.date; });

  sorted.forEach((entry) => {
    const isPast = entry.date < today;
    const isNext = entry.date === nextDate;
    list.appendChild(renderAgendaRow(entry, isPast, isNext));
  });
}

function renderAgendaRow(entry, isPast, isNext) {
  const row = document.createElement('div');
  row.className = 'agenda-row' + (isPast ? ' past' : ' future') + (isNext ? ' next' : '');

  const book = getBook(entry.bookId);
  const pin = isNext ? '<span class="agenda-pin">📌</span>' : '';
  const range = entry.upToPage
    ? `<span class="agenda-range">(até pág. ${entry.upToPage})</span>`
    : '';

  const bookEmoji = book ? book.emoji : '❓';
  const bookTitle = book ? book.title : `[${entry.bookId}]`;
  const bookAuthor = book ? book.author : '';

  row.innerHTML = `
    <div class="agenda-line-main">
      ${pin}
      <span class="agenda-date">${formatAgendaDate(entry.date)}</span>
      <span class="agenda-dot">·</span>
      <span class="agenda-book-emoji">${bookEmoji}</span>
      <span class="agenda-book-title">${bookTitle}</span>
      ${range}
    </div>
    ${bookAuthor ? `<div class="agenda-author">${bookAuthor}</div>` : ''}
    <div class="agenda-loc">${entry.location} · ${entry.time}</div>
  `;

  if (isPast) {
    if (entry.findings) {
      const f = document.createElement('p');
      f.className = 'agenda-findings';
      f.textContent = entry.findings;
      row.appendChild(f);
    }
    if (entry.participants && entry.participants.length > 0) {
      const p = document.createElement('div');
      p.className = 'agenda-participants';
      p.innerHTML = entry.participants
        .map((n) => `<span class="chip-small">${n}</span>`)
        .join('');
      row.appendChild(p);
    }
  }

  return row;
}

// ---- Router ----
const TABS = ['inicio', 'votacao', 'arquivo'];

function currentTab() {
  const h = window.location.hash.replace(/^#/, '');
  return TABS.includes(h) ? h : 'inicio';
}

function navigateTo(tab) {
  if (!TABS.includes(tab)) tab = 'inicio';
  if (currentTab() === tab) return;
  window.location.hash = '#' + tab;
}

function applyRoute() {
  const tab = currentTab();
  document.querySelectorAll('section[data-view]').forEach((s) => {
    s.classList.toggle('hidden', s.dataset.view !== tab);
  });
  document.querySelectorAll('.tab').forEach((a) => {
    a.classList.toggle('active', a.dataset.tab === tab);
  });
}

function initRouter() {
  document.querySelectorAll('.tab').forEach((a) => {
    a.addEventListener('click', (e) => {
      e.preventDefault();
      navigateTo(a.dataset.tab);
    });
  });
  window.addEventListener('hashchange', applyRoute);
  applyRoute();
}

// ---- Init ----
async function init() {
  // Check config
  if (_E === "COLA_AQUI_O_URL_EM_BASE64") {
    $("loading").classList.add("hidden");
    $("app").classList.remove("hidden");
    $("name-section").classList.add("hidden");
    $("error-banner").classList.remove("hidden");
    $("error-banner").textContent = "⚠️ Falta configurar o URL do Google Apps Script. Abre o ficheiro index.html e substitui COLA_AQUI_O_URL_EM_BASE64 pelo teu URL codificado (ver instruções).";
    return;
  }

  await loadData();
  if (ACTIVE_VOTE) renderCandidateBooks();
  renderArquivo();
  renderInicio();

  $("loading").classList.add("hidden");
  $("app").classList.remove("hidden");

  // Show peek button if there are votes
  if (Object.keys(voters).length > 0) {
    $("peek-btn").classList.remove("hidden");
  }

  // Name input
  $("name-input").addEventListener("input", () => {
    $("name-btn").disabled = !$("name-input").value.trim();
  });

  $("name-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") $("name-btn").click();
  });

  $("name-btn").addEventListener("click", () => {
    const name = $("name-input").value.trim();
    if (!name) return;
    if (voters[name.toLowerCase()]) {
      alert("Já existe um voto com este nome!");
      return;
    }
    submittedName = name;
    $("name-section").classList.add("hidden");
    $("vote-section").classList.remove("hidden");
    $("peek-btn").classList.add("hidden");
    $("greeting").innerHTML = 'Olá <strong>' + name + '</strong>! Selecciona até <strong>' + ACTIVE_VOTE.maxVotes + ' livros</strong>.';
  });

  $("submit-btn").addEventListener("click", submitVote);
  $("refresh-btn").addEventListener("click", async () => {
    await loadData();
    showLiveResults(hasVoted);
  });
  $("reset-btn").addEventListener("click", resetPoll);

  $("peek-btn").addEventListener("click", () => {
    showLiveResults(false);
  });
  $("back-btn").addEventListener("click", () => {
    $("results-section").classList.add("hidden");
    $("back-btn").classList.add("hidden");
    if (submittedName) {
      $("vote-section").classList.remove("hidden");
    } else {
      $("name-section").classList.remove("hidden");
      if (Object.keys(voters).length > 0) $("peek-btn").classList.remove("hidden");
    }
  });

  initRouter();
}

init();
</script>
